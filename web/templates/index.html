<!DOCTYPE html>
<html>
<head>
    <title>PLC Simulator</title>
    <style>
        body { font-family: monospace; margin: 20px; background: #1e1e1e; color: #d4d4d4; }
        h1 { color: #4ec9b0; }
        .section { background: #252526; padding: 15px; margin: 10px 0; border-radius: 5px; }
        .metric { display: inline-block; margin: 10px 20px 10px 0; }
        .label { color: #9cdcfe; }
        .value { color: #ce9178; font-weight: bold; }
        .sub-section { margin: 10px 0; padding: 10px; background: #1e1e1e; border-radius: 3px; }
        h2 { color: #4ec9b0; margin-top: 0; }
        h3 { color: #9cdcfe; }
    </style>
</head>
<body>
    <h1>🔧 PLC Simulator</h1>
    
    <div class="section">
        <h2>System Status</h2>
        <div id="status">Loading...</div>
    </div>
    
    <div class="section">
        <h2>Performance Metrics</h2>
        <div id="metrics">Loading...</div>
    </div>
    
    <div class="section">
        <h2>Cache</h2>
        <div id="cache">Loading...</div>
    </div>
    
    <div class="section">
        <h2>PLC Connection</h2>
        <div id="plc">Loading...</div>
    </div>

    <script>
        async function load() {
            try {
                const [status, metrics, cache, plc] = await Promise.all([
                    fetch('/api/status').then(r => r.json()),
                    fetch('/api/metrics').then(r => r.json()),
                    fetch('/api/cache').then(r => r.json()),
                    fetch('/api/plc').then(r => r.json())
                ]);
                
                // Status
                document.getElementById('status').innerHTML = 
                    '<div class="metric"><span class="label">Uptime:</span> <span class="value">' + status.uptime + '</span></div>' +
                    '<div class="metric"><span class="label">Goroutines:</span> <span class="value">' + status.goroutines + '</span></div>' +
                    '<div class="metric"><span class="label">Memory:</span> <span class="value">' + status.memory_kb + ' KB</span></div>';
                
                // Metrics - с утилизацией
                const utilPercent = (metrics.updater.utilization * 100).toFixed(1);
                const utilColor = metrics.updater.utilization > 0.8 ? '#ff6b6b' : (metrics.updater.utilization > 0.5 ? '#ffd93d' : '#6bcf7f');
                
                document.getElementById('metrics').innerHTML = 
                    '<div class="sub-section">' +
                    '<h3>Updater (read + write)</h3>' +
                    '<div class="metric"><span class="label">Last:</span> <span class="value">' + metrics.updater.last_ms + ' ms</span></div>' +
                    '<div class="metric"><span class="label">Avg:</span> <span class="value">' + metrics.updater.avg_ms + ' ms</span></div>' +
                    '<div class="metric"><span class="label">Runs:</span> <span class="value">' + metrics.updater.runs + '</span></div>' +
                    '<div class="metric"><span class="label">Utilization:</span> <span class="value" style="color: ' + utilColor + '">' + utilPercent + '%</span></div>' +
                    '</div>' +
                    '<div class="sub-section">' +
                    '<h3>Flush Write Queue</h3>' +
                    '<div class="metric"><span class="label">Last:</span> <span class="value">' + metrics.flush.last_ms + ' ms</span></div>' +
                    '<div class="metric"><span class="label">Avg:</span> <span class="value">' + metrics.flush.avg_ms + ' ms</span></div>' +
                    '<div class="metric"><span class="label">Runs:</span> <span class="value">' + metrics.flush.runs + '</span></div>' +
                    '</div>' +
                    '<div class="metric"><span class="label">Write Queue:</span> <span class="value">' + metrics.write_queue + '</span></div>';
                
                // Cache
                document.getElementById('cache').innerHTML = 
                    '<div class="metric"><span class="label">Tags:</span> <span class="value">' + cache.tags_count + '</span></div>' +
                    '<pre>' + JSON.stringify(cache.tags, null, 2) + '</pre>';
                
                // PLC
                document.getElementById('plc').innerHTML = 
                    '<div class="metric"><span class="label">Connected:</span> <span class="value">' + (plc.connected ? '✅' : '❌') + '</span></div>' +
                    '<div class="metric"><span class="label">IP:</span> <span class="value">' + plc.controller_ip + '</span></div>' +
                    '<div class="metric"><span class="label">Session:</span> <span class="value">' + plc.session + '</span></div>';
            } catch(e) {
                console.error('Error:', e);
            }
        }
        
        load();
        setInterval(load, 1000);
    </script>
</body>
</html>
